<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tijdelijke storing</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Mulish', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
  width: 220px;
  height: 340px;
  padding: 14px;
  background: #fcfcfc;
  border: 1px solid rgba(128,0,0,0.15);
  border-left: 4px solid #800000;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  line-height: 1.5;
}
h2 {
  font-family: 'Poppins', sans-serif;
  color: #800000;
  font-size: 15px;
  font-weight: 600;
  line-height: 1.3;
  margin-bottom: 8px;
}
p {
  color: #333;
  font-size: 11.5px;
  line-height: 1.5;
  margin-bottom: 8px;
}
.intact {
  background: rgba(128,0,0,0.06);
  padding: 6px 8px;
  border-radius: 3px;
  font-size: 11px;
  color: #555;
  margin-bottom: 10px;
}
.btn {
  display: block;
  background: #800000;
  color: #fff;
  text-decoration: none;
  padding: 9px 10px;
  border-radius: 4px;
  font-family: 'Poppins', sans-serif;
  font-weight: 600;
  font-size: 12px;
  text-align: center;
  border: 2px solid #800000;
}
.btn:hover { background: #660000; }
.note {
  font-size: 10px;
  color: #888;
  text-align: center;
  margin-top: 8px;
  font-style: italic;
}
</style>
</head>
<body>
<div>
<h2>Tijdelijke weergave-storing</h2>
<p>De desktopversie heeft een storing aan de kant van NING. Onze ledenadministratie is volledig intact.</p>
<div class="intact">Gebruik tijdelijk de mobiele versie — werkt op alle apparaten:</div>
</div>
<div>
<a class="btn" href="https://www.nederlanders.fr/m" target="_top">Ga naar werkende versie →</a>
<p class="note">NING-support werkt aan de oplossing</p>
</div>
</body>
</html>
