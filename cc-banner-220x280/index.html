<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<title>Café Claude · interactieve banner 220×280</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap">
<style>
:root{
  --maroon: #800000;
  --maroon-dk: #5a0000;
  --maroon-hi: #a30000;
  --cream: #fbf5ec;
  --ink: #1a1512;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:220px;height:340px;background:transparent;font-family:'Poppins','Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--ink);overflow:hidden;}
.stage{width:220px;height:340px;display:block;padding:0;margin:0;}

.banner {
  width: 220px; height: 280px;
  position: relative; overflow: hidden;
  border-radius: 12px;
  background: linear-gradient(135deg, #fbf5ec 0%, #f5e9d3 100%);
  border: 1px solid rgba(128,0,0,0.12);
  box-shadow: 0 1px 2px rgba(128,0,0,0.04), 0 6px 20px rgba(128,0,0,0.10), inset 0 0 0 1px rgba(255,255,255,0.3);
  isolation: isolate;
  font-family: 'Poppins', sans-serif;
  display: block; text-decoration: none; color: inherit;
}
.banner::before {
  content: ""; position: absolute; inset: -30%;
  background: radial-gradient(ellipse 50% 70% at 50% 40%, rgba(163,0,0,0.14) 0%, rgba(128,0,0,0.05) 40%, transparent 70%);
  filter: blur(14px); z-index: 0; opacity: 0.7;
  animation: breathe 9s ease-in-out infinite; pointer-events: none;
}
@keyframes breathe { 0%,100% { opacity: 0.45; transform: scale(0.95); } 50% { opacity: 0.9; transform: scale(1.05); } }

.banner .firefly { position: absolute; border-radius: 50%;
  background: radial-gradient(circle, rgba(163,0,0,0.45) 0%, rgba(163,0,0,0.12) 50%, transparent 80%);
  filter: blur(1.5px); pointer-events: none; opacity: 0; z-index: 1;
}
.banner .firefly.f1 { width: 6px; height: 6px; left: 10%; top: 10%; animation: fade1 7s ease-in-out infinite; }
.banner .firefly.f2 { width: 5px; height: 5px; right: 14%; top: 18%; animation: fade2 8.5s ease-in-out infinite 1.2s; }
.banner .firefly.f3 { width: 4px; height: 4px; left: 16%; bottom: 22%; animation: fade3 10s ease-in-out infinite 2.4s; }
.banner .firefly.f4 { width: 5px; height: 5px; right: 14%; bottom: 14%; animation: fade1 9s ease-in-out infinite 3.1s; }
.banner .firefly.f5 { width: 3.5px; height: 3.5px; left: 8%; top: 44%; animation: fade2 11s ease-in-out infinite 4.3s; }
@keyframes fade1 { 0%,100% { opacity: 0; } 30% { opacity: 0.7; } 70% { opacity: 0.3; } }
@keyframes fade2 { 0%,100% { opacity: 0; } 40% { opacity: 0.55; } 60% { opacity: 0.85; } }
@keyframes fade3 { 0%,100% { opacity: 0; } 50% { opacity: 0.65; } }

.banner .col { position: relative; z-index: 2; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: stretch; padding: 8px 12px 10px;
}
.banner .logo { width: 150px; height: 74px; flex-shrink: 0; margin: 0 auto; }
.banner .logo svg { width: 100%; height: 100%; display: block; }

.chips { display: flex; flex-direction: column; gap: 4px; width: 100%; margin-top: 6px; }
.chips .chip-row { display: flex; width: 100%; }
.chips .chip-row.l { justify-content: flex-start; }
.chips .chip-row.c { justify-content: center; }
.chips .chip-row.r { justify-content: flex-end; }

.chip {
  font-family: 'Poppins', sans-serif; font-size: 10px; font-weight: 500;
  color: var(--maroon); background: #fff;
  border: 1px solid rgba(128,0,0,0.35); border-radius: 14px;
  padding: 4px 10px; cursor: pointer;
  transition: background 0.2s, border-color 0.2s, color 0.2s, box-shadow 0.25s;
  white-space: nowrap; max-width: 100%; overflow: hidden; text-overflow: ellipsis;
  letter-spacing: 0.005em; opacity: 0; transform: translateY(8px) scale(0.96);
  position: relative;
}
.chip.visible { opacity: 1; transform: translateY(0) scale(1);
  transition: opacity 0.45s cubic-bezier(.2,.8,.2,1), transform 0.45s cubic-bezier(.2,.8,.2,1), background 0.2s, color 0.2s, border-color 0.2s, box-shadow 0.25s;
}
.chip:hover { background: #fef8ee; border-color: var(--maroon); transform: translateY(-1px) scale(1.02); box-shadow: 0 2px 6px rgba(128,0,0,0.18); }
.chip.active { background: var(--maroon); color: #fff; border-color: var(--maroon); }
.chip.pulse { box-shadow: 0 0 0 4px rgba(128,0,0,0.18); }
.chip .ripple {
  position: absolute; top: 50%; left: 50%;
  width: 6px; height: 6px; background: rgba(128,0,0,0.45);
  border-radius: 50%; transform: translate(-50%,-50%) scale(0);
  pointer-events: none; animation: ripple 0.7s ease-out forwards;
}
@keyframes ripple {
  0% { transform: translate(-50%,-50%) scale(0); opacity: 0.6; }
  100% { transform: translate(-50%,-50%) scale(10); opacity: 0; }
}

.cursor-hint { position: absolute; width: 18px; height: 18px; z-index: 5;
  pointer-events: none; opacity: 0;
  transition: opacity 0.35s ease, transform 0.5s cubic-bezier(.3,.1,.3,1);
  filter: drop-shadow(0 1px 2px rgba(0,0,0,0.25));
}
.cursor-hint.on { opacity: 1; } .cursor-hint.tap { transform: scale(0.82); }
.cursor-hint svg { width: 100%; height: 100%; display: block; }

.answer-area { margin-top: 6px; width: 100%; min-height: 40px;
  font-size: 10px; line-height: 1.4; color: #3a2a20;
  text-align: left; padding: 0 2px; flex: 1;
}
.answer-area.empty { color: #a8978a; font-style: italic; text-align: center; font-size: 9.5px; padding-top: 4px; }

.ring-wrap { display: flex; justify-content: center; align-items: center; padding: 4px 0; }
.ring { width: 26px; height: 26px; border-radius: 50%;
  border: 2.5px solid rgba(128,0,0,0.18);
  border-top-color: var(--maroon); border-right-color: var(--maroon);
  animation: ringSpin 0.9s linear infinite;
}
@keyframes ringSpin { to { transform: rotate(360deg); } }
.word { display: inline; opacity: 0; transition: opacity 0.28s ease; }
.word.on { opacity: 1; }

.cta { display: block; text-align: center;
  width: 220px; box-sizing: border-box;
  background: var(--maroon); color: #fff;
  font-size: 11px; font-weight: 600;
  padding: 10px 10px; border-radius: 8px;
  text-decoration: none; letter-spacing: 0.02em; margin-top: 12px;
  position: relative; overflow: hidden;
  transition: background 0.2s, transform 0.2s;
}
.cta:hover { background: var(--maroon-dk); transform: translateY(-1px); }
.cta::after { content: ""; position: absolute; top: 0; left: -80%;
  width: 50%; height: 100%;
  background: linear-gradient(110deg, transparent, rgba(255,255,255,0.4), transparent);
  animation: ctaShine 6s ease-in-out infinite;
}
@keyframes ctaShine { 0%,70%,100% { left: -80%; } 85% { left: 130%; } }
</style>
</head>
<body>
<div class="stage">
  <div class="banner" id="banner">
    <span class="firefly f1"></span><span class="firefly f2"></span><span class="firefly f3"></span>
    <span class="firefly f4"></span><span class="firefly f5"></span>
    <span class="cursor-hint" id="cursor">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 2 L4 18 L9 14 L12 21 L15 19.5 L12 12.5 L18 12 Z" fill="#800000" stroke="#fff" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
    </span>
    <div class="col">
      <div class="logo">
        <svg viewBox="0 0 150 74" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect x="6" y="4" width="78" height="28" rx="7" fill="#fff" stroke="#800000" stroke-width="1.4"/>
          <polygon points="20,32 16,44 32,32" fill="#fff" stroke="#800000" stroke-width="1.4" stroke-linejoin="round"/>
          <line x1="21" y1="31.3" x2="30" y2="31.3" stroke="#fff" stroke-width="2"/>
          <text x="45" y="23" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-weight="500" font-size="15" fill="#800000">Café</text>
          <rect x="66" y="36" width="78" height="28" rx="7" fill="#fff" stroke="#800000" stroke-width="1.4"/>
          <polygon points="126,64 130,74 114,64" fill="#fff" stroke="#800000" stroke-width="1.4" stroke-linejoin="round"/>
          <line x1="115" y1="63.3" x2="125" y2="63.3" stroke="#fff" stroke-width="2"/>
          <text x="105" y="55" text-anchor="middle" font-family="Poppins,Arial,sans-serif" font-weight="500" font-size="15" fill="#800000">Claude</text>
        </svg>
      </div>
      <div class="chips" id="chips">
        <div class="chip-row l"><button class="chip" data-i="0"></button></div>
        <div class="chip-row c"><button class="chip" data-i="1"></button></div>
        <div class="chip-row r"><button class="chip" data-i="2"></button></div>
      </div>
      <div class="answer-area empty" id="answer">Stel een vraag ↑</div>
    </div>
  </div>
  <a class="cta" id="cta" href="https://www.cafeclaude.fr/" target="_blank" rel="noopener">MAAK KENNIS!</a>
</div>
<script>
const TWEAKS = {
  q1: "Kies uit 6 domeinen",
  q2: "100+ unieke onderwerpen",
  q3: "Specifieke situaties",
  a1: "1) Ondernemen. 2) Wonen en vastgoed. 3) Geld & Belasting. 4) Verzekeren. 5) Gezondheid & Zorg. 6) Bureaucratie & Papieren.",
  a2: "Ondernemen (38) · Geld & Belasting (26) · Wonen & Leven (14) · Bureaucratie (13) · Verzekeren (10) · Zorg (4). Totaal 105 onderwerpen — en groeit.",
  a3: "Meer dan 700 specifieke situaties (april 2026). Elk antwoord wordt getoetst op 8 kwaliteitskenmerken en krijgt een score van 1 tot 10. Gecontroleerde antwoorden op basis van actuele overheidsbronnen en officiële instellingen.",
  cta: "MAAK KENNIS!"
};
const PLACEHOLDER = "Stel een vraag ↑";
const chips = document.getElementById('chips');
const answer = document.getElementById('answer');
const chipEls = chips.querySelectorAll('.chip');
const cursor = document.getElementById('cursor');
const answers = () => [TWEAKS.a1, TWEAKS.a2, TWEAKS.a3];
chipEls[0].textContent = TWEAKS.q1;
chipEls[1].textContent = TWEAKS.q2;
chipEls[2].textContent = TWEAKS.q3;
document.getElementById('cta').textContent = TWEAKS.cta;

let activeTimers = [], autoCancelled = false, autoRunning = false;
function clearTimers(){ activeTimers.forEach(clearTimeout); activeTimers = []; }
function cancelAuto(){ autoCancelled = true; autoRunning = false; clearTimers(); hideCursor(); }
function moveCursorTo(c, show){
  const b = document.getElementById('banner').getBoundingClientRect();
  const r = c.getBoundingClientRect();
  cursor.style.left = (r.left - b.left + r.width * 0.68) + 'px';
  cursor.style.top = (r.top - b.top + r.height * 0.55) + 'px';
  if (show) cursor.classList.add('on');
}
function tapCursor(){ cursor.classList.add('tap'); setTimeout(() => cursor.classList.remove('tap'), 180); }
function hideCursor(){ cursor.classList.remove('on','tap'); }
function addRipple(c){ const r = document.createElement('span'); r.className = 'ripple'; c.appendChild(r); setTimeout(() => r.remove(), 700); }

chipEls.forEach((el, i) => {
  el.addEventListener('mouseenter', () => { if (autoRunning) hideCursor(); });
  el.addEventListener('click', (e) => { e.preventDefault(); e.stopPropagation(); cancelAuto(); addRipple(el); askQuestion(i); });
});
function askQuestion(idx){
  clearTimers();
  chipEls.forEach((c, i) => c.classList.toggle('active', i === idx));
  answer.classList.remove('empty');
  answer.innerHTML = '<span class="ring-wrap"><span class="ring"></span></span>';
  activeTimers.push(setTimeout(() => streamAnswer(answers()[idx]), 1100));
}
function streamAnswer(text, onDone){
  const words = text.split(/(\s+)/);
  answer.innerHTML = words.map(w => w.trim() ? `<span class="word">${w}</span>` : w).join('');
  const spans = answer.querySelectorAll('.word');
  spans.forEach((s, i) => activeTimers.push(setTimeout(() => { s.classList.add('on'); if (i === spans.length - 1 && onDone) onDone(); }, i * 55)));
  if (!spans.length && onDone) onDone();
}
function playAuto(){
  autoCancelled = false; autoRunning = true; clearTimers();
  chipEls.forEach(c => c.classList.remove('visible','active','pulse'));
  answer.className = 'answer-area empty'; answer.textContent = PLACEHOLDER;
  const T = { flyIn: [300,1500,2700], click: [1000,2200,3400], ringAt: 3800, streamAt: 4900 };
  chipEls.forEach((c, i) => activeTimers.push(setTimeout(() => {
    if (autoCancelled) return; c.classList.add('visible');
    setTimeout(() => { if (!autoCancelled) moveCursorTo(c, true); }, 250);
  }, T.flyIn[i])));
  [0,1].forEach(i => {
    activeTimers.push(setTimeout(() => { if (autoCancelled) return; chipEls[i].classList.add('pulse','active'); addRipple(chipEls[i]); tapCursor(); }, T.click[i]));
    activeTimers.push(setTimeout(() => { if (autoCancelled) return; chipEls[i].classList.remove('pulse','active'); }, T.click[i] + 450));
  });
  activeTimers.push(setTimeout(() => {
    if (autoCancelled) return; chipEls[2].classList.add('pulse','active'); addRipple(chipEls[2]); tapCursor();
    setTimeout(() => chipEls[2].classList.remove('pulse'), 450);
    setTimeout(() => hideCursor(), 600);
  }, T.click[2]));
  activeTimers.push(setTimeout(() => { if (autoCancelled) return; answer.classList.remove('empty'); answer.innerHTML = '<span class="ring-wrap"><span class="ring"></span></span>'; }, T.ringAt));
  activeTimers.push(setTimeout(() => {
    if (autoCancelled) return;
    streamAnswer(answers()[2], () => activeTimers.push(setTimeout(() => { if (!autoCancelled) playAuto(); }, 10000)));
  }, T.streamAt));
}
playAuto();
</script>
</body>
</html>
